name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch --force origin +refs/heads/main:refs/remotes/origin/main

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install docpact
        run: cargo install docpact --version 0.1.9 --force

      - name: Run docpact release gate
        run: scripts/docpact-gate.sh --base origin/main

  test:
    name: test (${{ matrix.os }} / ${{ matrix.arch }})
    needs: release-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install build

      - name: Build distribution
        run: |
          python -m build

      - name: Publish distribution to PyPI
        run: |
          pip install twine
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
